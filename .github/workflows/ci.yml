name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee typecheck.log

      - name: Unit tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee tests.log

      - name: Production build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Upload failure logs
        if: steps.typecheck.outcome == 'failure' || steps.tests.outcome == 'failure' || steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: quality-logs
          path: |
            typecheck.log
            tests.log
            build.log
          retention-days: 7

      - name: Enforce quality gates
        if: steps.typecheck.outcome == 'failure' || steps.tests.outcome == 'failure' || steps.build.outcome == 'failure'
        run: |
          echo "Type check: ${{ steps.typecheck.outcome }}"
          echo "Unit tests: ${{ steps.tests.outcome }}"
          echo "Production build: ${{ steps.build.outcome }}"
          exit 1
